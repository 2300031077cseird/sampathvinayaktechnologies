<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abstract corporate grid pattern">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#051127"/>
      <stop offset="100%" stop-color="#0c3560"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#76dfff" stroke-opacity="0.17" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1de2ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1de2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="320" cy="180" r="240" fill="url(#glow)"/>
  <circle cx="1280" cy="760" r="260" fill="url(#glow)"/>
</svg>
